name: 更新Fork仓库指定分支

# ====== 可复用配置（修改此处即可适配新项目）======
env:
  # 必填配置：每个新项目必须修改这3项
  FORK_REPO: "1004452714/bettergi-scripts-list"    # Fork 仓库完整名称
  TARGET_DIR: "repo/js/批量讨伐角色养成材料BOSS"   # Fork 仓库中你的脚本所在目录
  SCRIPT_NAME: "批量讨伐角色养成材料BOSS"          # 脚本显示名称（用于提交信息）
  
  # 可选配置：根据需要修改
  BASE_BRANCH: "main"                              # Fork 仓库的基础分支

on:
  workflow_dispatch: # 仅手动触发
    inputs:
      branch_name:
        description: '目标分支名（必填，如：sync-auto-boss-20240101120000）'
        required: true
        type: string
      commit_message:
        description: '提交信息（可选，默认使用版本号）'
        required: false
        type: string
      force_push:
        description: '是否强制推送（会覆盖远程分支历史）'
        required: false
        type: boolean
        default: false

jobs:
  update-fork-branch:
    runs-on: ubuntu-latest
    steps:
      - name: 检出当前仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ssh-key: ${{ secrets.SSH_PRIVATE_KEY_CURRENT }}

      - name: 拉取最新更改
        run: |
          git pull origin main

      - name: 配置Git
        run: |
          git config --global user.name "DarkFlameMaster"
          git config --global user.email "actions@github.com"
          git config --global url."git@github.com:".insteadOf "https://github.com/"

      - name: 设置SSH密钥
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: 克隆fork仓库
        uses: actions/checkout@v4
        with:
          repository: ${{ env.FORK_REPO }}
          ref: ${{ env.BASE_BRANCH }}
          path: fork
          ssh-key: ${{ secrets.SSH_PRIVATE_KEY }}
          fetch-depth: 0
          sparse-checkout: |
            ${{ env.TARGET_DIR }}

      - name: 检查并切换到目标分支
        run: |
          cd fork
          # 获取所有远程分支
          git fetch --all
          
          # 检查远程分支是否存在
          if git ls-remote --heads origin ${{ inputs.branch_name }} | grep -q "${{ inputs.branch_name }}"; then
            echo "分支 ${{ inputs.branch_name }} 已存在，切换到该分支"
            git checkout ${{ inputs.branch_name }}
          else
            echo "分支 ${{ inputs.branch_name }} 不存在，从 ${{ env.BASE_BRANCH }} 创建新分支"
            git checkout -b ${{ inputs.branch_name }}
          fi

      - name: 同步代码到fork仓库
        run: |
          rm -rf fork/${{ env.TARGET_DIR }}/*
          rsync -av --exclude='.idea' --exclude='.github' --exclude='LICENSE' --exclude='.gitattributes' --exclude='fork' ./ fork/${{ env.TARGET_DIR }}/

      - name: 读取当前版本号
        id: get-version
        run: |
          CURRENT_VERSION=$(jq -r .version manifest.json)
          echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT

      - name: 检查是否有更改需要提交
        id: check-changes
        run: |
          cd fork
          git add ${{ env.TARGET_DIR }}/*
          if git diff --cached --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: 提交并推送代码到fork仓库
        if: steps.check-changes.outputs.has_changes == 'true'
        run: |
          cd fork
          # 确定提交信息
          if [ -n "${{ inputs.commit_message }}" ]; then
            COMMIT_MSG="${{ inputs.commit_message }}"
          else
            COMMIT_MSG="更新${{ env.SCRIPT_NAME }}至v${{ steps.get-version.outputs.current_version }}"
          fi
          
          git commit -m "$COMMIT_MSG"
          
          # 根据是否强制推送选择推送方式
          if [ "${{ inputs.force_push }}" = "true" ]; then
            echo "强制推送到分支 ${{ inputs.branch_name }}"
            git push origin ${{ inputs.branch_name }} --force
          else
            echo "推送到分支 ${{ inputs.branch_name }}"
            git push origin ${{ inputs.branch_name }}
          fi

      - name: 输出结果
        if: steps.check-changes.outputs.has_changes == 'true'
        run: |
          echo "=========================================="
          echo "✅ 推送成功！"
          echo "=========================================="
          echo "分支名: ${{ inputs.branch_name }}"
          echo "版本号: v${{ steps.get-version.outputs.current_version }}"
          echo "强制推送: ${{ inputs.force_push }}"
          echo ""
          echo "查看分支: https://github.com/${{ env.FORK_REPO }}/tree/${{ inputs.branch_name }}"
          echo "=========================================="

      - name: 无更改提示
        if: steps.check-changes.outputs.has_changes != 'true'
        run: |
          echo "=========================================="
          echo "⚠️ 没有检测到代码更改，跳过提交和推送"
          echo "=========================================="
