name: 同步代码并创建PR

# ====== 可复用配置（修改此处即可适配新项目）======
env:
  # 必填配置：每个新项目必须修改这6项
  FORK_REPO: "1004452714/bettergi-scripts-list"    # Fork 仓库完整名称
  FORK_OWNER: "1004452714"                         # Fork 仓库的用户名/组织名（用于跨仓库PR）
  UPSTREAM_REPO: "babalae/bettergi-scripts-list"   # 上游原始仓库名
  TARGET_DIR: "repo/js/批量讨伐角色养成材料BOSS"   # Fork 仓库中你的脚本所在目录
  BRANCH_NAME: "auto-boss"                         # 分支名中的脚本标识（不含时间戳）
  SCRIPT_NAME: "批量讨伐角色养成材料BOSS"          # 脚本显示名称（用于PR标题）
  
  # 可选配置：根据需要修改
  BRANCH_PREFIX: "sync-"                           # 创建分支时的前缀
  BASE_BRANCH: "main"                              # PR 的目标分支

on:
  workflow_dispatch: # 仅手动触发
    inputs:
      version:
        description: '版本号（自动递增，可指定，必须有两个点分隔,例：0.98.1）'
        required: false
        type: string
      pr_target:
        description: 'PR 目标仓库'
        required: true
        type: choice
        default: 'upstream'
        options:
          - fork
          - upstream

jobs:
  update-version:
    runs-on: ubuntu-latest
    steps:
      - name: 检出当前仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ssh-key: ${{ secrets.SSH_PRIVATE_KEY_CURRENT }}

      - name: 配置Git
        run: |
          git config --global user.name "DarkFlameMaster"
          git config --global user.email "actions@github.com"
          git config --global url."git@github.com:".insteadOf "https://github.com/"

      - name: 设置SSH密钥
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY_CURRENT }}

      - name: 读取当前版本号
        id: get-current-version
        run: |
          CURRENT_VERSION=$(jq -r .version manifest.json)
          echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT

      - name: 计算新版本号
        id: calculate-new-version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            NEW_VERSION="${{ inputs.version }}"
          else
            CURRENT_VERSION=$(jq -r .version manifest.json)
            IFS="." read -r major minor patch <<< "$CURRENT_VERSION"
            patch=$((patch + 1))
            NEW_VERSION="$major.$minor.$patch"
          fi
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: 更新manifest.json中的版本号
        run: |
          jq --arg version "${{ steps.calculate-new-version.outputs.new_version }}" '.version = $version' manifest.json > manifest.json.tmp && mv manifest.json.tmp manifest.json

      - name: 提交版本号更新
        run: |
          git add manifest.json
          git commit -m "Bump version to ${{ steps.calculate-new-version.outputs.new_version }}"
          git push origin HEAD:main

      - name: 创建并推送tag
        run: |
          TAG_NAME="v${{ steps.calculate-new-version.outputs.new_version }}"
          git tag $TAG_NAME
          git push origin $TAG_NAME

  sync-and-pr:
    runs-on: ubuntu-latest
    needs: update-version
    steps:
      - name: 检出当前仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ssh-key: ${{ secrets.SSH_PRIVATE_KEY }}
          ref: main

      - name: 拉取最新更改
        run: |
          git pull origin main

      - name: 配置Git
        run: |
          git config --global user.name "DarkFlameMaster"
          git config --global user.email "actions@github.com"
          git config --global url."git@github.com:".insteadOf "https://github.com/"

      - name: 设置SSH密钥
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: 克隆fork仓库
        uses: actions/checkout@v4
        with:
          repository: ${{ env.FORK_REPO }}
          ref: ${{ env.BASE_BRANCH }}
          path: fork
          ssh-key: ${{ secrets.SSH_PRIVATE_KEY }}
          fetch-depth: 0
          sparse-checkout: |
            ${{ env.TARGET_DIR }}

      - name: 添加上游仓库
        run: |
          cd fork
          git remote add upstream git@github.com:${{ env.UPSTREAM_REPO }}.git

      - name: 同步上游仓库（变基）
        run: |
          cd fork
          git fetch upstream ${{ env.BASE_BRANCH }}
          git rebase upstream/${{ env.BASE_BRANCH }}
          git push origin ${{ env.BASE_BRANCH }} --force-with-lease

      - name: 创建唯一分支名
        id: create-branch-name
        run: |
          BRANCH_NAME="${{ env.BRANCH_PREFIX }}${{ env.BRANCH_NAME }}-$(date +%Y%m%d%H%M%S)"
          echo "branch_name=$BRANCH_NAME" >> $GITHUB_OUTPUT

      - name: 在fork仓库中创建新分支
        run: |
          cd fork
          git checkout -b ${{ steps.create-branch-name.outputs.branch_name }}

      - name: 同步代码到fork仓库
        run: |
          rm -rf fork/${{ env.TARGET_DIR }}/*
          rsync -av --exclude='.idea' --exclude='.github' --exclude='LICENSE' --exclude='.gitattributes' --exclude='fork' ./ fork/${{ env.TARGET_DIR }}/

      - name: 获取提交记录
        id: get-commit-messages
        run: |
          ALL_TAGS=$(git tag -l "v*" | sort -V)
          mapfile -t TAGS_ARRAY <<< "$ALL_TAGS"
          TAG_COUNT=${#TAGS_ARRAY[@]}
          
          if [ $TAG_COUNT -ge 2 ]; then
            PREVIOUS_TAG=${TAGS_ARRAY[$TAG_COUNT-2]}
            CURRENT_TAG=${TAGS_ARRAY[$TAG_COUNT-1]}
            COMMITS=$(git log $PREVIOUS_TAG..$CURRENT_TAG --pretty=format:"- %h %s")
            echo "has_commits=true" >> $GITHUB_OUTPUT
          else
            COMMITS=""
            echo "has_commits=false" >> $GITHUB_OUTPUT
          fi
          echo "commits<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMITS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: 检查是否有更改需要提交
        id: check-changes
        run: |
          cd fork
          git add ${{ env.TARGET_DIR }}/*
          if git diff --cached --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: 提交并推送代码到fork仓库
        if: steps.check-changes.outputs.has_changes == 'true'
        run: |
          cd fork
          git commit -m "同步${{ env.SCRIPT_NAME }}更新"
          git push origin ${{ steps.create-branch-name.outputs.branch_name }}

      - name: 读取当前版本号
        id: get-version
        run: |
          CURRENT_VERSION=$(jq -r .version manifest.json)
          echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT

      - name: 使用GitHub API创建PR
        if: steps.check-changes.outputs.has_changes == 'true'
        run: |
          PR_BODY="同步[${{ env.SCRIPT_NAME }}](https://github.com/${{ env.FORK_REPO }}/commits/main/)仓库的更新"
          if [ "${{ steps.get-commit-messages.outputs.has_commits }}" = "true" ]; then
            PR_BODY="${PR_BODY}
          
            上次同步以来的变更：
            ${{ steps.get-commit-messages.outputs.commits }}"
          fi

          PR_BODY_ESCAPED=$(echo "$PR_BODY" | jq -R -s '.')
          
          if [ "${{ github.event.inputs.pr_target }}" = "upstream" ]; then
            TARGET_REPO="${{ env.UPSTREAM_REPO }}"
            HEAD_BRANCH="${{ env.FORK_OWNER }}:${{ steps.create-branch-name.outputs.branch_name }}"
          else
            TARGET_REPO="${{ env.FORK_REPO }}"
            HEAD_BRANCH="${{ steps.create-branch-name.outputs.branch_name }}"
          fi
          
          curl -X POST \
          -H "Authorization: token ${{ secrets.SYNC_TOKEN }}" \
          -H "Accept: application/vnd.github.v3+json" \
          https://api.github.com/repos/$TARGET_REPO/pulls \
          -d @- <<- EOF
              {
                "title": "${{ env.SCRIPT_NAME }} ${{ steps.get-version.outputs.current_version }}",
                "body": $PR_BODY_ESCAPED,
                "head": "$HEAD_BRANCH",
                "base": "${{ env.BASE_BRANCH }}"
              }
          EOF
